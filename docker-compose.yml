services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dominicember555-api
    image: dominicember555-api:latest
    ports:
      - "5021:5021"
    env_file:
      - .env
    volumes:
      # Mount logs to host for easy viewing without entering container
      - ./logs:/usr/src/app/logs
    restart: unless-stopped
    # If using local dockerized MongoDB, uncomment this dependency
    # depends_on:
    #   - db

