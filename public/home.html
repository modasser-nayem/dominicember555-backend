<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Server Console</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        background: #000;
        color: #0f0;
        font-family: "Courier New", monospace;
        overflow: hidden;
      }

      /* Matrix rain background */
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .terminal {
        position: relative;
        z-index: 1;
        width: 80%;
        max-width: 900px;
        height: 80%;
        margin: auto;
        margin-top: 5%;
        background: rgba(0, 0, 0, 0.8);
        padding: 20px;
        box-shadow: 0 0 20px #0f0;
        overflow-y: auto;
      }

      .line {
        margin: 2px 0;
        opacity: 0;
        animation: fadeIn 0.5s forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .info {
        color: #0f0;
      }
      .warn {
        color: #ff0;
      }
      .error {
        color: #f00;
      }

      .cursor {
        display: inline-block;
        width: 10px;
        background-color: #0f0;
        margin-left: 5px;
        animation: blink 0.8s infinite;
      }

      @keyframes blink {
        0%,
        50%,
        100% {
          opacity: 1;
        }
        25%,
        75% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="matrix"></canvas>
    <div class="terminal" id="terminal"></div>

    <script>
      // Matrix rain effect
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;

      const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
      const fontSize = 14;
      const columns = canvas.width / fontSize;
      const drops = Array(Math.floor(columns)).fill(1);

      function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f0";
        ctx.font = fontSize + "px Courier";
        for (let i = 0; i < drops.length; i++) {
          const text = letters.charAt(
            Math.floor(Math.random() * letters.length),
          );
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }
      setInterval(drawMatrix, 50);

      // Fake server logs
      const terminal = document.getElementById("terminal");
      const logs = [
        "[BOOT] Initializing API server...",
        "[INFO] Loading configuration :: OK",
        "[INFO] Connecting to database :: SUCCESS",
        "[INFO] Redis job queue :: READY",
        "[SECURE] TLS handshake established",
        "[AUTH] Token service online",
        "[WORKER] Async jobs running...",
        "[STATUS] Health check :: PASSED",
        "[OK] API Server is Running...",
      ];

      let index = 0;
      function addLog() {
        if (index < logs.length) {
          const div = document.createElement("div");
          div.className = "line info";
          if (logs[index].includes("WARN")) div.className = "line warn";
          if (logs[index].includes("ERROR")) div.className = "line error";
          div.textContent = logs[index];
          terminal.appendChild(div);
          index++;
        } else {
          const prompt = document.createElement("div");
          prompt.className = "line";
          prompt.innerHTML = "root@server:~$ <span class='cursor'></span>";
          terminal.appendChild(prompt);
          clearInterval(logInterval);
        }
        terminal.scrollTop = terminal.scrollHeight;
      }

      const logInterval = setInterval(addLog, 1000);
    </script>
  </body>
</html>
